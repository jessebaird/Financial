<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time in the Market Explorer</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD versions for standalone use) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel standalone to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // Inline SVG Icons
        const TrendingUpIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>;
        const ClockIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const TargetIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
        const RocketIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg>;
        const EyeIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const EyeOffIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>;
        const RotateCcwIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;

        const getMilestoneMultiplier = (age) => {
            let m = 1;
            if (age >= 25) m *= 10;
            if (age >= 30) m *= 2;
            if (age >= 35) m *= 2;
            if (age >= 50) m *= 2;
            return m;
        };

        const DEFAULT_SCENARIOS = {
            smartStudent: { isVisible: true, startAge: 18, initialMonthly: 100 },
            procrastinator: { isVisible: true, startAge: 40, initialMonthly: 880 },
            gradual: { isVisible: true, startAge: 18, initialMonthly: 15, annualIncreaseRate: 12 },
            milestones: { isVisible: true, startAge: 18, initialMonthly: 7 }
        };

        // Helper to retrieve data from localStorage safely
        const getStoredVal = (key, defaultVal, isJson = false) => {
            try {
                const item = localStorage.getItem(`marketExplorer_${key}`);
                if (item === null) return defaultVal;
                if (isJson) return JSON.parse(item);
                if (typeof defaultVal === 'boolean') return item === 'true';
                if (typeof defaultVal === 'number') return Number(item);
                return item;
            } catch (e) {
                return defaultVal;
            }
        };

        function App() {
            // Global settings
            const [returnRate, setReturnRate] = useState(() => getStoredVal('rr', 10));
            const [retirementAge, setRetirementAge] = useState(() => getStoredVal('ra', 65));
            const [useInflation, setUseInflation] = useState(() => getStoredVal('inf', false));
            const [inflationRate, setInflationRate] = useState(() => getStoredVal('ir', 3));
            const [linkAges, setLinkAges] = useState(() => getStoredVal('la', false));
            
            // Target Mode settings
            const [targetMode, setTargetMode] = useState(() => getStoredVal('tm', false));
            const [targetAmount, setTargetAmount] = useState(() => getStoredVal('ta', 1000000));

            // Saver Mode
            const [showSaver, setShowSaver] = useState(() => getStoredVal('ss', false));
            const [savingsRate, setSavingsRate] = useState(() => getStoredVal('sr', 4));
            
            // Fee Mode
            const [useFees, setUseFees] = useState(() => getStoredVal('uf', false));
            const [feeRate, setFeeRate] = useState(() => getStoredVal('fr', 0.5));

            // Starting Balance & Age
            const [startingBalance, setStartingBalance] = useState(() => getStoredVal('sb', 0));
            const [currentAge, setCurrentAge] = useState(() => getStoredVal('ca', 18));

            // Scenario Configurations
            const [scenarios, setScenarios] = useState(() => getStoredVal('scen', DEFAULT_SCENARIOS, true));

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // Sync state to LocalStorage seamlessly
            useEffect(() => {
                localStorage.setItem('marketExplorer_rr', returnRate);
                localStorage.setItem('marketExplorer_ra', retirementAge);
                localStorage.setItem('marketExplorer_inf', useInflation);
                localStorage.setItem('marketExplorer_ir', inflationRate);
                localStorage.setItem('marketExplorer_la', linkAges);
                localStorage.setItem('marketExplorer_tm', targetMode);
                localStorage.setItem('marketExplorer_ta', targetAmount);
                localStorage.setItem('marketExplorer_ss', showSaver);
                localStorage.setItem('marketExplorer_sr', savingsRate);
                localStorage.setItem('marketExplorer_uf', useFees);
                localStorage.setItem('marketExplorer_fr', feeRate);
                localStorage.setItem('marketExplorer_sb', startingBalance);
                localStorage.setItem('marketExplorer_ca', currentAge);
                localStorage.setItem('marketExplorer_scen', JSON.stringify(scenarios));
            }, [returnRate, retirementAge, useInflation, inflationRate, linkAges, targetMode, targetAmount, showSaver, savingsRate, useFees, feeRate, startingBalance, currentAge, scenarios]);

            // Reset Function
            const resetToDefaults = () => {
                setReturnRate(10);
                setRetirementAge(65);
                setUseInflation(false);
                setInflationRate(3);
                setLinkAges(false);
                setTargetMode(false);
                setTargetAmount(1000000);
                setShowSaver(false);
                setSavingsRate(4);
                setUseFees(false);
                setFeeRate(0.5);
                setStartingBalance(0);
                setCurrentAge(18);
                setScenarios(DEFAULT_SCENARIOS);
                
                // Clear URL params visually on reset
                window.history.replaceState({}, '', window.location.pathname);
            };
            
            // Handle Current Age Change to prevent time travel
            const handleCurrentAgeChange = (val) => {
                const newAge = Number(val);
                setCurrentAge(newAge);
                
                // Push target age up if needed
                if (retirementAge <= newAge) {
                    setRetirementAge(newAge + 1);
                }
                
                // Push scenario start ages up if they are now in the past
                setScenarios(prev => {
                    let next = { ...prev };
                    let updated = false;
                    Object.keys(next).forEach(key => {
                        if (next[key].startAge < newAge) {
                            next[key].startAge = newAge;
                            updated = true;
                        }
                    });
                    return updated ? next : prev;
                });
            };

            // Generate the dataset year by year
            const { data, summary, catchUpMonthly, requiredMonthly, requiredMonthlySaver } = useMemo(() => {
                const grossRate = returnRate / 100;
                const netRate = grossRate - (useFees ? feeRate / 100 : 0);
                const saverRate = savingsRate / 100; // Fees generally don't apply to savings accounts
                const infRate = useInflation ? (inflationRate / 100) : 0;
                const finalDiscount = Math.pow(1 + infRate, retirementAge - currentAge);

                // Initial pass: If Target Mode is ON, calculate the required starting monthly contributions
                let reqMonthly = {
                    student: scenarios.smartStudent.initialMonthly,
                    procrastinator: scenarios.procrastinator.initialMonthly,
                    gradual: scenarios.gradual.initialMonthly,
                    milestones: scenarios.milestones.initialMonthly
                };
                
                let reqMonthlySaver = { ...reqMonthly }; // If Target mode off, saver uses exact same initial inputs

                if (targetMode && targetAmount > 0) {
                    // Calculate "multipliers" (final balances if starting contribution is $1)
                    // We use the netRate here so the Target Amount is hit AFTER fees are taken.
                    let b1 = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                    let cm1 = { student: 1, procrastinator: 1, gradual: 1, milestones: 1 };
                    
                    let b1Saver = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                    let cm1Saver = { student: 1, procrastinator: 1, gradual: 1, milestones: 1 };
                    
                    let sbFV = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                    let sbFVSaver = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };

                    for (let age = currentAge; age <= retirementAge; age++) {
                        // Invested Multipliers (Net of Fees)
                        if (age === currentAge) sbFV.student += startingBalance;
                        if (age >= scenarios.smartStudent.startAge) {
                            b1.student = b1.student * (1 + netRate) + cm1.student * 12;
                            sbFV.student *= (1 + netRate);
                        }
                        if (age === currentAge) sbFV.procrastinator += startingBalance;
                        if (age >= scenarios.procrastinator.startAge) {
                            b1.procrastinator = b1.procrastinator * (1 + netRate) + cm1.procrastinator * 12;
                            sbFV.procrastinator *= (1 + netRate);
                        }
                        if (age === currentAge) sbFV.gradual += startingBalance;
                        if (age >= scenarios.gradual.startAge) {
                            b1.gradual = b1.gradual * (1 + netRate) + cm1.gradual * 12;
                            cm1.gradual *= (1 + (scenarios.gradual.annualIncreaseRate / 100));
                            sbFV.gradual *= (1 + netRate);
                        }
                        if (age === currentAge) sbFV.milestones += startingBalance;
                        if (age >= scenarios.milestones.startAge) {
                            b1.milestones = b1.milestones * (1 + netRate) + getMilestoneMultiplier(age) * 12;
                            sbFV.milestones *= (1 + netRate);
                        }
                        
                        // Saver Multipliers
                        if (age === currentAge) sbFVSaver.student += startingBalance;
                        if (age >= scenarios.smartStudent.startAge) {
                            b1Saver.student = b1Saver.student * (1 + saverRate) + cm1Saver.student * 12;
                            sbFVSaver.student *= (1 + saverRate);
                        }
                        if (age === currentAge) sbFVSaver.procrastinator += startingBalance;
                        if (age >= scenarios.procrastinator.startAge) {
                            b1Saver.procrastinator = b1Saver.procrastinator * (1 + saverRate) + cm1Saver.procrastinator * 12;
                            sbFVSaver.procrastinator *= (1 + saverRate);
                        }
                        if (age === currentAge) sbFVSaver.gradual += startingBalance;
                        if (age >= scenarios.gradual.startAge) {
                            b1Saver.gradual = b1Saver.gradual * (1 + saverRate) + cm1Saver.gradual * 12;
                            cm1Saver.gradual *= (1 + (scenarios.gradual.annualIncreaseRate / 100));
                            sbFVSaver.gradual *= (1 + saverRate);
                        }
                        if (age === currentAge) sbFVSaver.milestones += startingBalance;
                        if (age >= scenarios.milestones.startAge) {
                            b1Saver.milestones = b1Saver.milestones * (1 + saverRate) + getMilestoneMultiplier(age) * 12;
                            sbFVSaver.milestones *= (1 + saverRate);
                        }
                    }
                    
                    // Apply inflation discount to the multipliers
                    b1.student /= finalDiscount;
                    b1.procrastinator /= finalDiscount;
                    b1.gradual /= finalDiscount;
                    b1.milestones /= finalDiscount;
                    
                    b1Saver.student /= finalDiscount;
                    b1Saver.procrastinator /= finalDiscount;
                    b1Saver.gradual /= finalDiscount;
                    b1Saver.milestones /= finalDiscount;

                    sbFV.student /= finalDiscount;
                    sbFV.procrastinator /= finalDiscount;
                    sbFV.gradual /= finalDiscount;
                    sbFV.milestones /= finalDiscount;

                    sbFVSaver.student /= finalDiscount;
                    sbFVSaver.procrastinator /= finalDiscount;
                    sbFVSaver.gradual /= finalDiscount;
                    sbFVSaver.milestones /= finalDiscount;
                    
                    // Calculate required amount to hit the Target Portfolio
                    reqMonthly = {
                        student: b1.student > 0 ? Math.max(0, (targetAmount - sbFV.student) / b1.student) : 0,
                        procrastinator: b1.procrastinator > 0 ? Math.max(0, (targetAmount - sbFV.procrastinator) / b1.procrastinator) : 0,
                        gradual: b1.gradual > 0 ? Math.max(0, (targetAmount - sbFV.gradual) / b1.gradual) : 0,
                        milestones: b1.milestones > 0 ? Math.max(0, (targetAmount - sbFV.milestones) / b1.milestones) : 0
                    };
                    
                    reqMonthlySaver = {
                        student: b1Saver.student > 0 ? Math.max(0, (targetAmount - sbFVSaver.student) / b1Saver.student) : 0,
                        procrastinator: b1Saver.procrastinator > 0 ? Math.max(0, (targetAmount - sbFVSaver.procrastinator) / b1Saver.procrastinator) : 0,
                        gradual: b1Saver.gradual > 0 ? Math.max(0, (targetAmount - sbFVSaver.gradual) / b1Saver.gradual) : 0,
                        milestones: b1Saver.milestones > 0 ? Math.max(0, (targetAmount - sbFVSaver.milestones) / b1Saver.milestones) : 0
                    };
                }

                // Second pass: Calculate actual chart data
                let chartData = [];
                let balances = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                let grossBalances = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                let balancesSaver = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                let totalInvested = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                let totalInvestedSaver = { student: 0, procrastinator: 0, gradual: 0, milestones: 0 };
                
                let currentMonthly = { ...reqMonthly };
                let currentMonthlySaver = { ...reqMonthlySaver };
                
                // For milestones, reverse engineer the absolute base 
                let milestoneBase = targetMode 
                    ? reqMonthly.milestones 
                    : scenarios.milestones.initialMonthly / getMilestoneMultiplier(scenarios.milestones.startAge);
                    
                let milestoneBaseSaver = targetMode 
                    ? reqMonthlySaver.milestones 
                    : scenarios.milestones.initialMonthly / getMilestoneMultiplier(scenarios.milestones.startAge);

                for (let age = currentAge; age <= retirementAge; age++) {
                    let row = { age };
                    let sContrib = 0, pContrib = 0, gContrib = 0, mContrib = 0;
                    let sContribSaver = 0, pContribSaver = 0, gContribSaver = 0, mContribSaver = 0;

                    // Discount factor for "Real" balances (adjusting for inflation)
                    const discount = Math.pow(1 + infRate, age - currentAge);

                    // 1. The Early Starter
                    if (age === currentAge) {
                        grossBalances.student += startingBalance;
                        balances.student += startingBalance;
                        balancesSaver.student += startingBalance;
                        totalInvested.student += startingBalance;
                        totalInvestedSaver.student += startingBalance;
                    }
                    if (age >= scenarios.smartStudent.startAge) {
                        sContrib = currentMonthly.student * 12;
                        sContribSaver = currentMonthlySaver.student * 12;
                        
                        grossBalances.student = grossBalances.student * (1 + grossRate) + sContrib;
                        balances.student = balances.student * (1 + netRate) + sContrib;
                        balancesSaver.student = balancesSaver.student * (1 + saverRate) + sContribSaver;
                        
                        totalInvested.student += sContrib;
                        totalInvestedSaver.student += sContribSaver;
                    }
                    row.student = balances.student / discount;
                    row.studentSaver = balancesSaver.student / discount;
                    row.studentInvested = totalInvested.student; // Locked to nominal out-of-pocket cash
                    row.studentContrib = sContrib; // Keep nominal for display
                    row.studentStartBal = age === currentAge ? startingBalance : 0;

                    // 2. The Procrastinator / Catch-Up
                    if (age === currentAge) {
                        grossBalances.procrastinator += startingBalance;
                        balances.procrastinator += startingBalance;
                        balancesSaver.procrastinator += startingBalance;
                        totalInvested.procrastinator += startingBalance;
                        totalInvestedSaver.procrastinator += startingBalance;
                    }
                    if (age >= scenarios.procrastinator.startAge) {
                        pContrib = currentMonthly.procrastinator * 12;
                        pContribSaver = currentMonthlySaver.procrastinator * 12;
                        
                        grossBalances.procrastinator = grossBalances.procrastinator * (1 + grossRate) + pContrib;
                        balances.procrastinator = balances.procrastinator * (1 + netRate) + pContrib;
                        balancesSaver.procrastinator = balancesSaver.procrastinator * (1 + saverRate) + pContribSaver;
                        
                        totalInvested.procrastinator += pContrib;
                        totalInvestedSaver.procrastinator += pContribSaver;
                    }
                    row.procrastinator = balances.procrastinator / discount;
                    row.procrastinatorSaver = balancesSaver.procrastinator / discount;
                    row.procrastinatorInvested = totalInvested.procrastinator; // Locked to nominal out-of-pocket cash
                    row.procrastinatorContrib = pContrib;
                    row.procrastinatorStartBal = age === currentAge ? startingBalance : 0;

                    // 3. Gradual Increase
                    if (age === currentAge) {
                        grossBalances.gradual += startingBalance;
                        balances.gradual += startingBalance;
                        balancesSaver.gradual += startingBalance;
                        totalInvested.gradual += startingBalance;
                        totalInvestedSaver.gradual += startingBalance;
                    }
                    if (age >= scenarios.gradual.startAge) {
                        gContrib = currentMonthly.gradual * 12;
                        gContribSaver = currentMonthlySaver.gradual * 12;
                        
                        grossBalances.gradual = grossBalances.gradual * (1 + grossRate) + gContrib;
                        balances.gradual = balances.gradual * (1 + netRate) + gContrib;
                        balancesSaver.gradual = balancesSaver.gradual * (1 + saverRate) + gContribSaver;
                        
                        totalInvested.gradual += gContrib;
                        totalInvestedSaver.gradual += gContribSaver;
                        
                        currentMonthly.gradual *= (1 + (scenarios.gradual.annualIncreaseRate / 100));
                        currentMonthlySaver.gradual *= (1 + (scenarios.gradual.annualIncreaseRate / 100));
                    }
                    row.gradual = balances.gradual / discount;
                    row.gradualSaver = balancesSaver.gradual / discount;
                    row.gradualInvested = totalInvested.gradual; // Locked to nominal out-of-pocket cash
                    row.gradualContrib = gContrib;
                    row.gradualStartBal = age === currentAge ? startingBalance : 0;

                    // 4. Milestones
                    if (age === currentAge) {
                        grossBalances.milestones += startingBalance;
                        balances.milestones += startingBalance;
                        balancesSaver.milestones += startingBalance;
                        totalInvested.milestones += startingBalance;
                        totalInvestedSaver.milestones += startingBalance;
                    }
                    if (age >= scenarios.milestones.startAge) {
                        let mMult = getMilestoneMultiplier(age);
                        mContrib = milestoneBase * mMult * 12;
                        mContribSaver = milestoneBaseSaver * mMult * 12;
                        
                        grossBalances.milestones = grossBalances.milestones * (1 + grossRate) + mContrib;
                        balances.milestones = balances.milestones * (1 + netRate) + mContrib;
                        balancesSaver.milestones = balancesSaver.milestones * (1 + saverRate) + mContribSaver;
                        
                        totalInvested.milestones += mContrib;
                        totalInvestedSaver.milestones += mContribSaver;
                    }
                    row.milestones = balances.milestones / discount;
                    row.milestonesSaver = balancesSaver.milestones / discount;
                    row.milestonesInvested = totalInvested.milestones; // Locked to nominal out-of-pocket cash
                    row.milestonesContrib = mContrib;
                    row.milestonesStartBal = age === currentAge ? startingBalance : 0;

                    chartData.push(row);
                }

                // Apply final discount to summaries to match chart
                const finalBalances = {
                    student: balances.student / finalDiscount,
                    procrastinator: balances.procrastinator / finalDiscount,
                    gradual: balances.gradual / finalDiscount,
                    milestones: balances.milestones / finalDiscount
                };
                const finalBalancesSaver = {
                    student: balancesSaver.student / finalDiscount,
                    procrastinator: balancesSaver.procrastinator / finalDiscount,
                    gradual: balancesSaver.gradual / finalDiscount,
                    milestones: balancesSaver.milestones / finalDiscount
                };
                const finalLostToFees = {
                    student: (grossBalances.student - balances.student) / finalDiscount,
                    procrastinator: (grossBalances.procrastinator - balances.procrastinator) / finalDiscount,
                    gradual: (grossBalances.gradual - balances.gradual) / finalDiscount,
                    milestones: (grossBalances.milestones - balances.milestones) / finalDiscount,
                };
                const finalInvested = {
                    student: totalInvested.student,
                    procrastinator: totalInvested.procrastinator,
                    gradual: totalInvested.gradual,
                    milestones: totalInvested.milestones
                };
                const finalInvestedSaver = {
                    student: totalInvestedSaver.student,
                    procrastinator: totalInvestedSaver.procrastinator,
                    gradual: totalInvestedSaver.gradual,
                    milestones: totalInvestedSaver.milestones
                };

                // Calculate Cost of Waiting (how much Procrastinator needs to match Early Starter)
                let requiredCatchUp = 0;
                const n = retirementAge - scenarios.procrastinator.startAge + 1; // +1 mathematically required to account for inclusive compounding years
                if (n > 0 && netRate > 0) {
                    const target = finalBalances.student;
                    // PMT = FV * r / ((1+r)^n - 1)
                    requiredCatchUp = (target * netRate) / (Math.pow(1 + netRate, n) - 1) / 12;
                }

                return { 
                    data: chartData, 
                    summary: { 
                        balances: finalBalances, 
                        balancesSaver: finalBalancesSaver, 
                        lostToFees: finalLostToFees,
                        totalInvested: finalInvested,
                        totalInvestedSaver: finalInvestedSaver 
                    },
                    catchUpMonthly: requiredCatchUp,
                    requiredMonthly: {
                        ...reqMonthly,
                        milestones: reqMonthly.milestones * getMilestoneMultiplier(scenarios.milestones.startAge)
                    },
                    requiredMonthlySaver: {
                        ...reqMonthlySaver,
                        milestones: reqMonthlySaver.milestones * getMilestoneMultiplier(scenarios.milestones.startAge)
                    }
                };
            }, [returnRate, retirementAge, scenarios, useInflation, inflationRate, targetMode, targetAmount, savingsRate, useFees, feeRate, startingBalance, currentAge]);

            const formatCurrency = (value) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    maximumFractionDigits: 0,
                }).format(value || 0);
            };

            const updateScenario = (key, field, value) => {
                setScenarios(prev => ({
                    ...prev,
                    [key]: { ...prev[key], [field]: field === 'isVisible' ? value : Number(value) }
                }));
            };

            const handleAgeChange = (sourceKey, newAge) => {
                const ageValue = Number(newAge);
                if (linkAges) {
                    setScenarios(prev => {
                        const next = { ...prev };
                        for (const k in next) {
                            next[k] = { ...next[k], startAge: ageValue };
                        }
                        return next;
                    });
                } else {
                    updateScenario(sourceKey, 'startAge', ageValue);
                }
            };

            const toggleVisibility = (key) => {
                updateScenario(key, 'isVisible', !scenarios[key].isVisible);
            };
            
            // Toggle target mode, and lock in the math if turning off
            const handleTargetModeToggle = (e) => {
                e.stopPropagation();
                if (targetMode) {
                    setScenarios(prev => ({
                        ...prev,
                        smartStudent: { ...prev.smartStudent, initialMonthly: Math.round(requiredMonthly.student) },
                        procrastinator: { ...prev.procrastinator, initialMonthly: Math.round(requiredMonthly.procrastinator) },
                        gradual: { ...prev.gradual, initialMonthly: Math.round(requiredMonthly.gradual) },
                        milestones: { ...prev.milestones, initialMonthly: Math.round(requiredMonthly.milestones) }
                    }));
                }
                setTargetMode(!targetMode);
            };

            // Custom slider component to handle dynamic labels
            const renderSlider = (scenarioKey, colorClass, accentClass) => {
                const min = currentAge;
                const max = Math.max(currentAge, retirementAge - 1);
                const range = max - min === 0 ? 1 : max - min;
                const value = scenarios[scenarioKey].startAge;
                const percent = ((value - min) / range) * 100;
                
                // Keep label perfectly centered over the thumb natively
                const thumbOffset = 8 - (percent * 0.16);

                return (
                    <div className="relative pt-8 pb-3 mb-2 mt-2">
                        {/* Dynamic Floating Label */}
                        <div 
                            className="absolute top-0 transform -translate-x-1/2 flex flex-col items-center justify-center pointer-events-none"
                            style={{ left: `calc(${percent}% + ${thumbOffset}px)` }}
                        >
                            <div className="bg-white/90 backdrop-blur-sm px-2 py-0.5 rounded-lg shadow-sm border border-slate-200 flex flex-col items-center min-w-[70px]">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wide leading-none mb-1">Start Age</span>
                                <span className={`text-lg font-black ${colorClass} leading-none`}>{value}</span>
                            </div>
                        </div>
                        
                        <input 
                            type="range" 
                            min={min} 
                            max={max} 
                            value={value} 
                            onChange={e => handleAgeChange(scenarioKey, e.target.value)} 
                            className={`w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer ${accentClass} relative z-10 mt-1`} 
                        />
                        
                        {/* Bottom Track Labels */}
                        <div className="flex justify-between mt-2 px-1 pointer-events-none">
                            <div className="flex flex-col items-start">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider leading-none mb-1">Current Age</span>
                                <span className="text-sm font-extrabold text-slate-500 leading-none">{min}</span>
                            </div>
                            <div className="flex flex-col items-end">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider leading-none mb-1">Target Age</span>
                                <span className="text-sm font-extrabold text-slate-500 leading-none">{retirementAge}</span>
                            </div>
                        </div>
                    </div>
                );
            };

            // Manage Chart.js instance
            useEffect(() => {
                if (!chartRef.current) return;

                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.age),
                        datasets: [
                            // 1. Main Investment Datasets
                            {
                                label: 'Early Starter',
                                data: data.map(d => d.student),
                                investedData: data.map(d => d.studentInvested),
                                hidden: !scenarios.smartStudent.isVisible,
                                borderColor: '#3b82f6',
                                backgroundColor: '#3b82f6',
                                borderWidth: 4,
                                pointRadius: 0,
                                pointHoverRadius: 8,
                                tension: 0.1
                            },
                            {
                                label: 'Playing Catch-Up',
                                data: data.map(d => d.procrastinator),
                                investedData: data.map(d => d.procrastinatorInvested),
                                hidden: !scenarios.procrastinator.isVisible,
                                borderColor: '#ef4444',
                                backgroundColor: '#ef4444',
                                borderWidth: 4,
                                pointRadius: 0,
                                pointHoverRadius: 8,
                                tension: 0.1
                            },
                            {
                                label: 'Gradual Increase',
                                data: data.map(d => d.gradual),
                                investedData: data.map(d => d.gradualInvested),
                                hidden: !scenarios.gradual.isVisible,
                                borderColor: '#10b981',
                                backgroundColor: '#10b981',
                                borderWidth: 4,
                                pointRadius: 0,
                                pointHoverRadius: 8,
                                tension: 0.1
                            },
                            {
                                label: 'Big Milestones',
                                data: data.map(d => d.milestones),
                                investedData: data.map(d => d.milestonesInvested),
                                hidden: !scenarios.milestones.isVisible,
                                borderColor: '#8b5cf6',
                                backgroundColor: '#8b5cf6',
                                borderWidth: 4,
                                pointRadius: function(context) {
                                    const age = data[context.dataIndex]?.age;
                                    return [25, 30, 35, 50].includes(age) ? 8 : 0;
                                },
                                pointBackgroundColor: '#8b5cf6',
                                pointBorderColor: '#8b5cf6',
                                pointBorderWidth: 2,
                                pointHoverRadius: 10,
                                tension: 0.1
                            },
                            // 2. Savings Datasets (Rendered under main lines if toggled on)
                            {
                                label: `Early Starter (${savingsRate}% Saved)`,
                                data: data.map(d => d.studentSaver),
                                investedData: data.map(d => targetMode ? d.studentInvested : d.studentInvested), // Reused logic handles both
                                hidden: !scenarios.smartStudent.isVisible || !showSaver,
                                borderColor: 'rgba(59, 130, 246, 0.6)',
                                borderWidth: 3,
                                borderDash: [6, 6],
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                tension: 0.1
                            },
                            {
                                label: `Playing Catch-Up (${savingsRate}% Saved)`,
                                data: data.map(d => d.procrastinatorSaver),
                                investedData: data.map(d => d.procrastinatorInvested),
                                hidden: !scenarios.procrastinator.isVisible || !showSaver,
                                borderColor: 'rgba(239, 68, 68, 0.6)',
                                borderWidth: 3,
                                borderDash: [6, 6],
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                tension: 0.1
                            },
                            {
                                label: `Gradual Increase (${savingsRate}% Saved)`,
                                data: data.map(d => d.gradualSaver),
                                investedData: data.map(d => d.gradualInvested),
                                hidden: !scenarios.gradual.isVisible || !showSaver,
                                borderColor: 'rgba(16, 185, 129, 0.6)',
                                borderWidth: 3,
                                borderDash: [6, 6],
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                tension: 0.1
                            },
                            {
                                label: `Big Milestones (${savingsRate}% Saved)`,
                                data: data.map(d => d.milestonesSaver),
                                investedData: data.map(d => d.milestonesInvested),
                                hidden: !scenarios.milestones.isVisible || !showSaver,
                                borderColor: 'rgba(139, 92, 246, 0.6)',
                                borderWidth: 3,
                                borderDash: [6, 6],
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                tension: 0.1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            tooltip: {
                                backgroundColor: 'rgba(255, 255, 255, 0.98)',
                                titleColor: '#0f172a',
                                bodyColor: '#1e293b',
                                borderColor: '#cbd5e1',
                                borderWidth: 2,
                                padding: 16,
                                boxPadding: 8,
                                titleFont: { size: 20, weight: 'bold' },
                                bodyFont: { size: 18 },
                                callbacks: {
                                    title: function(tooltipItems) {
                                        return 'Age ' + tooltipItems[0].label;
                                    },
                                    label: function(context) {
                                        return `${context.dataset.label}: ${formatCurrency(context.parsed.y)}`;
                                    }
                                }
                            },
                            legend: {
                                display: false // Disabled default legend to use custom HTML legend in the header
                            }
                        },
                        scales: {
                            x: {
                                title: { 
                                    display: true, 
                                    text: 'Age', 
                                    color: '#475569', 
                                    font: { weight: 'bold', size: 18 } 
                                },
                                grid: { display: false },
                                ticks: { 
                                    color: '#475569',
                                    font: { size: 16, weight: '600' }
                                }
                            },
                            y: {
                                grid: { color: '#e2e8f0', borderDash: [4, 4], lineWidth: 2 },
                                ticks: {
                                    color: '#475569',
                                    font: { size: 16, weight: '600' },
                                    callback: function(value) {
                                        if (value >= 1000000) {
                                            return '$' + (value / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
                                        }
                                        if (value >= 1000) {
                                            return '$' + (value / 1000).toFixed(0) + 'k';
                                        }
                                        return '$' + value;
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [data, scenarios, showSaver, targetMode, savingsRate, useFees]);

            const renderTable = (scenarioKey, title, dataKey, contribKey, borderClass) => {
                // Ensure table only renders if the scenario is visible
                if (!scenarios[scenarioKey].isVisible) {
                    return <div className="hidden xl:block"></div>;
                }
                
                return (
                    <div className={`bg-white rounded-2xl shadow-md border-t-8 border-x-2 border-b-2 border-x-slate-200 border-b-slate-200 ${borderClass} overflow-hidden`}>
                        <div className="p-4 bg-slate-50 border-b-2 border-slate-200 text-center font-bold text-slate-800 text-xl">
                            {title} Detail
                        </div>
                        <div className="p-4 pt-3">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="text-slate-600 text-sm md:text-base uppercase tracking-wider font-bold border-b-2 border-slate-200">
                                        <th className="pb-3 pt-1">Age</th>
                                        <th className="pb-3 pt-1 text-right">Monthly</th>
                                        <th className="pb-3 pt-1 text-right">Annual</th>
                                        <th className="pb-3 pt-1 text-right">Balance</th>
                                    </tr>
                                </thead>
                                <tbody className="text-base sm:text-lg">
                                    {data.map(row => {
                                        const isMilestoneRow = scenarioKey === 'milestones' && [25, 30, 35, 50].includes(row.age);
                                        return (
                                        <tr key={row.age} className={`border-t border-slate-100 transition-colors ${isMilestoneRow ? 'bg-purple-50 hover:bg-purple-100' : 'hover:bg-slate-100'}`}>
                                            <td className={`py-2.5 text-slate-700 ${isMilestoneRow ? 'font-bold text-purple-700' : 'font-medium'}`}>
                                                <div className="flex items-center gap-1.5">
                                                    <span>{row.age}</span>
                                                    {isMilestoneRow && <span className="text-[9px] sm:text-[10px] bg-purple-200 text-purple-800 px-1.5 sm:px-2 py-0.5 rounded-full uppercase tracking-wider whitespace-nowrap shrink-0">{row.age === 25 ? '10x Bump' : '2x Bump'}</span>}
                                                </div>
                                            </td>
                                            <td className={`py-2.5 text-right ${isMilestoneRow ? 'font-bold text-purple-700' : 'text-slate-600'}`}>{formatCurrency(row[contribKey] / 12)}</td>
                                            <td className={`py-2.5 text-right ${isMilestoneRow ? 'font-bold text-purple-700' : 'text-slate-800'}`}>
                                                <div className="flex items-center justify-end gap-1.5 sm:gap-2">
                                                    {row[contribKey.replace('Contrib', 'StartBal')] > 0 && (
                                                        <span className="text-[9px] sm:text-[10px] font-bold text-slate-500 bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded uppercase tracking-wide whitespace-nowrap shrink-0">
                                                            +{formatCurrency(row[contribKey.replace('Contrib', 'StartBal')])} Start
                                                        </span>
                                                    )}
                                                    <span>{formatCurrency(row[contribKey])}</span>
                                                </div>
                                            </td>
                                            <td className="py-2.5 text-right font-bold text-slate-900">{formatCurrency(row[dataKey])}</td>
                                        </tr>
                                    )})}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative bg-slate-50">
                    
                    {/* Sticky Header & Controls */}
                    <div className="sticky top-0 z-50 pt-2 md:pt-4 pb-2 md:pb-4 px-2 md:px-4 bg-slate-50/95 backdrop-blur-md shadow-sm border-b border-slate-200">
                        <div className="max-w-[2000px] mx-auto flex flex-col bg-white p-3 md:p-4 rounded-2xl shadow-sm border-2 border-slate-200 gap-3 md:gap-4">
                            
                            {/* TOP ROW: Title, Always-On Settings, Reset */}
                            <div className="flex flex-col xl:flex-row xl:items-center justify-between gap-4 border-b border-slate-100 pb-3 md:pb-4">
                                {/* Left: Title */}
                                <div className="flex items-center gap-3 shrink-0 px-1">
                                    <TrendingUpIcon className="text-blue-600 w-8 h-8 md:w-10 md:h-10" />
                                    <div>
                                        <h1 className="text-xl md:text-2xl font-extrabold text-slate-900 tracking-tight leading-none">Time in the Market</h1>
                                        <p className="text-slate-500 text-xs md:text-sm font-bold mt-1">Interactive visualization</p>
                                    </div>
                                </div>
                                
                                {/* Right: Primary Always-On Controls */}
                                <div className="flex flex-wrap gap-2 md:gap-3 items-center xl:ml-auto">
                                    
                                    {/* Start Balance Input */}
                                    <div className="flex items-center px-3 py-1.5 md:py-2 rounded-lg bg-white shadow-sm border-2 border-slate-300 focus-within:border-blue-500 transition-colors">
                                        <label className="text-xs md:text-sm font-extrabold text-slate-800 mr-2 whitespace-nowrap">Starting Balance</label>
                                        <span className="text-slate-800 font-extrabold text-sm md:text-base mr-1">$</span>
                                        <input type="text" placeholder="0" value={startingBalance ? startingBalance.toLocaleString('en-US') : ''} onChange={(e) => setStartingBalance(Number(e.target.value.replace(/[^0-9]/g, '')))} className="w-20 md:w-24 text-right outline-none font-extrabold text-sm md:text-base text-slate-900 bg-transparent" />
                                    </div>

                                    {/* Return Input */}
                                    <div className="flex items-center px-3 py-1.5 md:py-2 rounded-lg bg-white shadow-sm border-2 border-slate-300 focus-within:border-blue-500 transition-colors">
                                        <label className="text-xs md:text-sm font-extrabold text-slate-800 mr-2 whitespace-nowrap">Annual Return</label>
                                        <input type="number" step="0.1" value={returnRate} onChange={(e) => setReturnRate(Number(e.target.value))} className="w-12 md:w-14 text-right outline-none font-extrabold text-sm md:text-base text-slate-900 bg-transparent" />
                                        <span className="text-slate-800 font-extrabold text-sm md:text-base ml-1">%</span>
                                    </div>

                                    {/* Current Age Input */}
                                    <div className="flex items-center px-3 py-1.5 md:py-2 rounded-lg bg-white shadow-sm border-2 border-slate-300 focus-within:border-blue-500 transition-colors">
                                        <label className="text-xs md:text-sm font-extrabold text-slate-800 mr-2 whitespace-nowrap">Current Age</label>
                                        <input type="number" value={currentAge} onChange={(e) => handleCurrentAgeChange(e.target.value)} className="w-10 md:w-12 text-right outline-none font-extrabold text-sm md:text-base text-slate-900 bg-transparent" />
                                    </div>

                                    {/* Target Age Input */}
                                    <div className="flex items-center px-3 py-1.5 md:py-2 rounded-lg bg-white shadow-sm border-2 border-slate-300 focus-within:border-blue-500 transition-colors">
                                        <label className="text-xs md:text-sm font-extrabold text-slate-800 mr-2 whitespace-nowrap">Target Age</label>
                                        <input type="number" value={retirementAge} onChange={(e) => setRetirementAge(Number(e.target.value))} className="w-10 md:w-12 text-right outline-none font-extrabold text-sm md:text-base text-slate-900 bg-transparent" />
                                    </div>

                                    {/* Reset Button */}
                                    <div className="flex items-center gap-1.5 px-3 py-1.5 md:py-2 rounded-lg bg-slate-800 text-white shadow-sm border-2 border-slate-800 cursor-pointer hover:bg-slate-700 transition-colors ml-auto md:ml-2" onClick={resetToDefaults} title="Reset to Defaults">
                                        <RotateCcwIcon className="w-4 h-4 md:w-5 md:h-5 shrink-0" />
                                        <span className="text-xs md:text-sm font-bold select-none whitespace-nowrap">Reset</span>
                                    </div>
                                </div>
                            </div>

                            {/* BOTTOM ROW: Toggle Features */}
                            <div className="flex flex-wrap gap-2 md:gap-3 items-center xl:justify-end pb-1 md:pb-0">
                                
                                {/* Link Ages Toggle */}
                                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-lg shadow-sm border-2 transition-all cursor-pointer ${linkAges ? 'bg-blue-50 border-blue-400 ring-1 ring-blue-100' : 'bg-slate-100 border-slate-200 hover:bg-slate-200 opacity-90'}`} onClick={() => setLinkAges(!linkAges)}>
                                    <input type="checkbox" checked={linkAges} readOnly className={`w-4 h-4 rounded cursor-pointer shrink-0 pointer-events-none ${linkAges ? 'text-blue-600' : 'text-slate-400 grayscale opacity-50'}`} />
                                    <span className={`text-sm font-bold cursor-pointer select-none whitespace-nowrap pointer-events-none ${linkAges ? 'text-blue-800' : 'text-slate-500'}`}>Link Start Ages</span>
                                </div>
                            
                                {/* Target Mode */}
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-lg shadow-sm border-2 transition-all cursor-pointer ${targetMode ? 'bg-blue-50 border-blue-400 ring-1 ring-blue-100' : 'bg-slate-100 border-slate-200 hover:bg-slate-200 opacity-90'}`} onClick={handleTargetModeToggle}>
                                    <input type="checkbox" checked={targetMode} readOnly className={`w-4 h-4 rounded cursor-pointer shrink-0 pointer-events-none ${targetMode ? 'text-blue-600' : 'text-slate-400 grayscale opacity-50'}`} />
                                    <span className={`text-sm font-bold cursor-pointer select-none whitespace-nowrap pointer-events-none ${targetMode ? 'text-blue-800' : 'text-slate-500'}`}>Target Portfolio</span>
                                    <div className={`flex items-center ml-1 pl-2 border-l transition-colors ${targetMode ? 'border-blue-300' : 'border-slate-300'}`} onClick={(e) => e.stopPropagation()}>
                                        <span className={`font-bold text-base mr-1 transition-colors ${targetMode ? 'text-blue-800' : 'text-slate-400'}`}>$</span>
                                        <input type="text" value={targetAmount ? targetAmount.toLocaleString('en-US') : ''} onChange={(e) => setTargetAmount(Number(e.target.value.replace(/[^0-9]/g, '')))} disabled={!targetMode} className={`w-24 md:w-28 text-right outline-none font-extrabold text-base bg-transparent transition-colors ${targetMode ? 'text-blue-900' : 'text-slate-500 cursor-not-allowed'}`} />
                                    </div>
                                </div>

                                {/* Saver Mode */}
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-lg shadow-sm border-2 transition-all cursor-pointer ${showSaver ? 'bg-indigo-50 border-indigo-400 ring-1 ring-indigo-100' : 'bg-slate-100 border-slate-200 hover:bg-slate-200 opacity-90'}`} onClick={() => setShowSaver(!showSaver)}>
                                    <input type="checkbox" checked={showSaver} readOnly className={`w-4 h-4 rounded cursor-pointer shrink-0 pointer-events-none ${showSaver ? 'text-indigo-600' : 'text-slate-400 grayscale opacity-50'}`} />
                                    <span className={`text-sm font-bold cursor-pointer select-none whitespace-nowrap pointer-events-none ${showSaver ? 'text-indigo-800' : 'text-slate-500'}`}>Compare to Savings</span>
                                    <div className={`flex items-center ml-1 pl-2 border-l transition-colors ${showSaver ? 'border-indigo-300' : 'border-slate-300'}`} onClick={(e) => e.stopPropagation()}>
                                        <input type="number" step="0.1" value={savingsRate} onChange={(e) => setSavingsRate(Number(e.target.value))} disabled={!showSaver} className={`w-12 md:w-14 text-right outline-none font-extrabold text-base bg-transparent transition-colors ${showSaver ? 'text-indigo-900' : 'text-slate-500 cursor-not-allowed'}`} />
                                        <span className={`font-bold text-base ml-1 transition-colors ${showSaver ? 'text-indigo-800' : 'text-slate-400'}`}>%</span>
                                    </div>
                                </div>

                                {/* Inflation */}
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-lg shadow-sm border-2 transition-all cursor-pointer ${useInflation ? 'bg-amber-50 border-amber-400 ring-1 ring-amber-100' : 'bg-slate-100 border-slate-200 hover:bg-slate-200 opacity-90'}`} onClick={() => setUseInflation(!useInflation)}>
                                    <input type="checkbox" checked={useInflation} readOnly className={`w-4 h-4 rounded cursor-pointer shrink-0 pointer-events-none ${useInflation ? 'text-amber-600' : 'text-slate-400 grayscale opacity-50'}`} />
                                    <span className={`text-sm font-bold cursor-pointer select-none whitespace-nowrap pointer-events-none ${useInflation ? 'text-amber-800' : 'text-slate-500'}`}>Inflation</span>
                                    <div className={`flex items-center ml-1 pl-2 border-l transition-colors ${useInflation ? 'border-amber-300' : 'border-slate-300'}`} onClick={(e) => e.stopPropagation()}>
                                        <input type="number" step="0.1" value={inflationRate} onChange={(e) => setInflationRate(Number(e.target.value))} disabled={!useInflation} className={`w-12 md:w-14 text-right outline-none font-extrabold text-base bg-transparent transition-colors ${useInflation ? 'text-amber-900' : 'text-slate-500 cursor-not-allowed'}`} />
                                        <span className={`font-bold text-base ml-1 transition-colors ${useInflation ? 'text-amber-800' : 'text-slate-400'}`}>%</span>
                                    </div>
                                </div>

                                {/* Mgmt Fee */}
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-lg shadow-sm border-2 transition-all cursor-pointer ${useFees ? 'bg-rose-50 border-rose-400 ring-1 ring-rose-100' : 'bg-slate-100 border-slate-200 hover:bg-slate-200 opacity-90'}`} onClick={() => setUseFees(!useFees)}>
                                    <input type="checkbox" checked={useFees} readOnly className={`w-4 h-4 rounded cursor-pointer shrink-0 pointer-events-none ${useFees ? 'text-rose-600' : 'text-slate-400 grayscale opacity-50'}`} />
                                    <span className={`text-sm font-bold cursor-pointer select-none whitespace-nowrap pointer-events-none ${useFees ? 'text-rose-800' : 'text-slate-500'}`}>Management Fee</span>
                                    <div className={`flex items-center ml-1 pl-2 border-l transition-colors ${useFees ? 'border-rose-300' : 'border-slate-300'}`} onClick={(e) => e.stopPropagation()}>
                                        <input type="number" step="0.01" value={feeRate} onChange={(e) => setFeeRate(Number(e.target.value))} disabled={!useFees} className={`w-12 md:w-14 text-right outline-none font-extrabold text-base bg-transparent transition-colors ${useFees ? 'text-rose-900' : 'text-slate-500 cursor-not-allowed'}`} />
                                        <span className={`font-bold text-base ml-1 transition-colors ${useFees ? 'text-rose-800' : 'text-slate-400'}`}>%</span>
                                    </div>
                                </div>

                            </div>

                                                            onChange={e => updateScenario('milestones', 'initialMonthly', e.target.value.replace(/[^0-9]/g, ''))} 
                                                            disabled={targetMode} 
                                                            className={`w-20 md:w-24 text-right outline-none bg-transparent font-bold text-lg xl:text-xl ${targetMode ? 'text-purple-800 cursor-not-allowed' : 'text-slate-800'}`} 
                                                        />
                                                    </div>
                                                    {targetMode && showSaver && (
                                                        <div className="text-xs font-bold text-slate-400 mt-1">
                                                            vs {formatCurrency(requiredMonthlySaver.milestones)} saved
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-inner space-y-2 mt-auto">
                                            <div className="flex justify-between items-end">
                                                <span className="text-base font-semibold text-slate-500 mb-0.5">Final Balance</span>
                                                <div className="text-right">
                                                    <div className="text-2xl font-black text-purple-600 tracking-tight leading-none">{formatCurrency(summary.balances.milestones)}</div>
                                                    {!targetMode && showSaver && <div className="text-sm font-bold text-slate-400 mt-1">vs {formatCurrency(summary.balancesSaver.milestones)} saved</div>}
                                                </div>
                                            </div>
                                            {useFees && (
                                                <div className="flex justify-between items-end pt-2 border-t border-slate-200/60 mt-2">
                                                    <span className="text-sm font-bold text-slate-500 mb-0.5">Lost to Fees</span>
                                                    <div className="text-right">
                                                        <div className="text-sm font-bold text-rose-500 leading-none">-{formatCurrency(summary.lostToFees.milestones)}</div>
                                                    </div>
                                                </div>
                                            )}
                                            <div className="flex justify-between items-end pt-2 border-t-2 border-slate-200 mt-2">
                                                <span className="text-base font-medium text-slate-500">Total Invested</span>
                                                <div className="text-right">
                                                    <div className="text-base font-bold text-slate-800">{formatCurrency(summary.totalInvested.milestones)}</div>
                                                    {targetMode && showSaver && <div className="text-xs font-bold text-slate-400 mt-1">vs {formatCurrency(summary.totalInvestedSaver.milestones)} saved</div>}
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-end mt-2">
                                                <span className="text-base font-bold text-slate-500 mb-0.5">Total Earnings</span>
                                                <div className="text-right">
                                                    <div className="text-base font-bold text-emerald-600 leading-none">+{formatCurrency(summary.balances.milestones - summary.totalInvested.milestones)}</div>
                                                    {showSaver && <div className="text-xs font-bold text-slate-400 mt-1">vs +{formatCurrency(summary.balancesSaver.milestones - summary.totalInvestedSaver.milestones)}</div>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Expanded Tables Grid */}
                        {Object.values(scenarios).some(s => s.isVisible) && (
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 items-start mt-4">
                                {renderTable('smartStudent', '1. Early Starter', 'student', 'studentContrib', 'border-t-blue-500')}
                                {renderTable('procrastinator', '2. Playing Catch-Up', 'procrastinator', 'procrastinatorContrib', 'border-t-red-500')}
                                {renderTable('gradual', '3. Gradual Increase', 'gradual', 'gradualContrib', 'border-t-emerald-500')}
                                {renderTable('milestones', '4. Milestones', 'milestones', 'milestonesContrib', 'border-t-purple-500')}
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        // Initialize App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
